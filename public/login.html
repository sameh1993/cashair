<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | نظام الكاشير</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card" id="app">
    <div class="login-logo">
      <div class="icon">🛒</div>
      <h1>نظام الكاشير</h1>
      <p>سجل دخولك للمتابعة</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">اسم المستخدم</label>
        <input type="text" id="username" class="form-control" placeholder="admin"
               autocomplete="username" required autofocus>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label class="form-label">كلمة المرور</label>
        <div style="position:relative">
          <input type="password" id="password" class="form-control" placeholder="••••••••"
                 autocomplete="current-password" required>
          <button type="button" id="togglePwd"
                  style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#94a3b8;">👁</button>
        </div>
      </div>

      <div id="errorMsg" style="background:#fee2e2;color:#b91c1c;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;"></div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
        <span id="loginText">دخول</span>
        <span id="loginSpinner" class="spinner" style="display:none;width:16px;height:16px;border-width:2px;"></span>
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;color:#94a3b8;font-size:12px;">
      المستخدم الافتراضي: <strong>admin</strong> / كلمة المرور: <strong>1234</strong>
    </p>
  </div>
</div>

<script>
document.getElementById('togglePwd').onclick = function() {
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
};

document.getElementById('loginForm').onsubmit = async function(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const text = document.getElementById('loginText');
  const spinner = document.getElementById('loginSpinner');
  const errDiv = document.getElementById('errorMsg');

  btn.disabled = true;
  text.style.display = 'none';
  spinner.style.display = '';
  errDiv.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/pos';
    } else {
      errDiv.textContent = data.message || 'بيانات غير صحيحة';
      errDiv.style.display = 'block';
      btn.disabled = false;
      text.style.display = '';
      spinner.style.display = 'none';
    }
  } catch {
    errDiv.textContent = 'خطأ في الاتصال';
    errDiv.style.display = 'block';
    btn.disabled = false;
    text.style.display = '';
    spinner.style.display = 'none';
  }
};
</script>
</body>
</html>
